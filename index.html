<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --obsidian:#0A0A0B;
    --charcoal:#141416;
    --graphite:#232326;
    --graphite-2:#2E2E31;
    --bone:#F5F3EE;
    --steel:#8B8B92;
    --gold:#F2B705;
    --amber-deep:#C98A12;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--obsidian);
    color:var(--bone);
    font-family:'Inter',sans-serif;
    line-height:1.6;
    overflow-x:hidden;
  }
  h1,h2,h3,.display{
    font-family:'Chakra Petch',sans-serif;
    font-weight:600;
    letter-spacing:-0.01em;
    line-height:1.08;
  }
  .mono{
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.14em;
    text-transform:uppercase;
    font-weight:700;
    font-size:12px;
  }
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 32px;}

  /* ---------- nav ---------- */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    background:rgba(10,10,11,0.72);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:76px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{width:34px;height:34px;border-radius:8px;}
  .brand span{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:18px;letter-spacing:0.02em;}
  .brand span em{color:var(--gold);font-style:normal;}
  .nav-cta{
    background:var(--gold);color:var(--obsidian);
    padding:11px 22px;border-radius:999px;
    font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:14px;
    transition:transform .2s ease, box-shadow .2s ease;
    white-space:nowrap;
  }
  .nav-cta:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(242,183,5,0.28);}

  /* ---------- hero ---------- */
  .hero{
    position:relative;
    padding:168px 0 96px;
    overflow:hidden;
  }
  .hero::before{
    content:'';
    position:absolute; top:0; left:50%; width:1px; height:100%;
    background:linear-gradient(to bottom, transparent, var(--gold) 18%, var(--gold) 82%, transparent);
    opacity:0.35;
  }
  .hero-grid{
    display:grid;
    grid-template-columns:1.05fr 0.95fr;
    gap:56px;
    align-items:center;
  }
  .eyebrow{
    color:var(--gold);
    display:inline-flex;align-items:center;gap:10px;
    margin-bottom:22px;
    opacity:0;animation:rise .7s ease forwards;
  }
  .eyebrow::before{
    content:'';width:22px;height:1px;background:var(--gold);
  }
  .hero h1{
    font-size:clamp(2.4rem, 4.6vw, 3.9rem);
    opacity:0;animation:rise .7s ease .1s forwards;
  }
  .hero h1 .accent{color:var(--gold);}
  .hero p.lede{
    margin-top:22px;max-width:480px;
    color:var(--steel);font-size:17px;
    opacity:0;animation:rise .7s ease .22s forwards;
  }
  .hero-ctas{
    margin-top:36px;display:flex;gap:14px;flex-wrap:wrap;
    opacity:0;animation:rise .7s ease .34s forwards;
  }
  .btn-primary{
    background:var(--gold);color:var(--obsidian);
    padding:15px 28px;border-radius:999px;
    font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:15px;
    transition:transform .2s ease, box-shadow .2s ease;
    display:inline-block;
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(242,183,5,0.3);}
  .btn-ghost{
    border:1px solid var(--graphite-2);
    padding:15px 28px;border-radius:999px;
    font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:15px;
    transition:border-color .2s ease, color .2s ease;
    display:inline-block;
  }
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold);}

  .hero-photo{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    aspect-ratio:3/4;
    opacity:0;animation:rise .9s ease .2s forwards;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
  }
  .hero-photo img{width:100%;height:100%;object-fit:cover;object-position:center 12%;}
  .hero-photo::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(10,10,11,0) 55%, rgba(10,10,11,0.55) 100%);
  }
  .hero-photo .tag{
    position:absolute;left:18px;bottom:18px;z-index:2;
    background:rgba(10,10,11,0.55);backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.12);
    padding:8px 14px;border-radius:999px;
    font-size:12px;color:var(--bone);
  }

  @keyframes rise{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* ---------- section shared ---------- */
  section{padding:104px 0;position:relative;}
  .section-head{max-width:640px;margin-bottom:56px;}
  .section-head .eyebrow{margin-bottom:16px;}
  .section-head h2{font-size:clamp(1.9rem, 3.2vw, 2.6rem);}
  .section-head p{color:var(--steel);margin-top:16px;font-size:16px;max-width:560px;}

  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease, transform .7s ease;}
  .reveal.in{opacity:1;transform:translateY(0);}

  /* ---------- before/after ---------- */
  .compare{
    display:grid;grid-template-columns:1fr 1fr;gap:0;
    border:1px solid var(--graphite);border-radius:18px;overflow:hidden;
  }
  .compare > div{padding:36px;}
  .compare .before{background:var(--charcoal);}
  .compare .after{background:linear-gradient(160deg, rgba(242,183,5,0.08), transparent 60%), var(--charcoal);border-left:1px solid var(--graphite);}
  .compare h3{font-size:13px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.12em;color:var(--steel);margin-bottom:22px;font-weight:700;}
  .compare .after h3{color:var(--gold);}
  .compare ul{list-style:none;}
  .compare li{
    display:flex;gap:12px;align-items:flex-start;
    padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.05);
    font-size:15px;color:var(--bone);
  }
  .compare li:last-child{border-bottom:none;}
  .compare .before li{color:var(--steel);}
  .mark{flex:none;width:18px;height:18px;margin-top:2px;}

  /* ---------- features ---------- */
  .feat-groups{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;}
  .feat-card{
    background:var(--charcoal);border:1px solid var(--graphite);border-radius:18px;padding:34px;
    transition:transform .25s ease, border-color .25s ease;
  }
  .feat-card:hover{transform:translateY(-4px);border-color:var(--graphite-2);}
  .feat-card .badge{
    display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;
    text-transform:uppercase;padding:5px 12px;border-radius:999px;margin-bottom:20px;font-weight:700;
  }
  .feat-card.essencial .badge{background:var(--graphite-2);color:var(--steel);}
  .feat-card.plus .badge{background:rgba(242,183,5,0.10);color:var(--gold);}
  .feat-card.pro .badge{background:rgba(242,183,5,0.14);color:var(--gold);}
  .feat-card h3{font-size:22px;margin-bottom:6px;}
  .feat-card .feat-sub{color:var(--steel);font-size:14px;margin-bottom:24px;}
  .feat-card ul{list-style:none;}
  .feat-card li{display:flex;gap:12px;align-items:flex-start;padding:11px 0;font-size:15px;border-bottom:1px solid rgba(255,255,255,0.05);}
  .feat-card li:last-child{border-bottom:none;}
  .feat-card.plus{border-color:rgba(242,183,5,0.16);}
  .feat-card.pro{border-color:rgba(242,183,5,0.35);position:relative;}
  .feat-card.pro::before{
    content:'';position:absolute;inset:0;border-radius:18px;padding:1px;
    background:linear-gradient(160deg, rgba(242,183,5,0.5), transparent 40%);
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    pointer-events:none;
  }

  /* ---------- how it works ---------- */
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
  .step{padding-top:20px;border-top:1px solid var(--graphite);}
  .step .num{font-family:'JetBrains Mono',monospace;color:var(--gold);font-size:13px;font-weight:700;letter-spacing:0.08em;}
  .step h4{margin-top:14px;font-size:18px;font-family:'Chakra Petch',sans-serif;font-weight:600;}
  .step p{margin-top:8px;color:var(--steel);font-size:14.5px;}

  /* ---------- plans ---------- */
  .plans{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;}
  .plan-card{
    background:var(--charcoal);border:1px solid var(--graphite);border-radius:20px;
    padding:40px;display:flex;flex-direction:column;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .plan-card:hover{transform:translateY(-4px);box-shadow:0 20px 40px -16px rgba(0,0,0,0.5);}
  .plan-card.plus{border-color:rgba(242,183,5,0.3);}
  .plan-card.pro{border-color:var(--gold);background:linear-gradient(165deg, rgba(242,183,5,0.10), var(--charcoal) 55%);}
  .plan-name{font-family:'Chakra Petch',sans-serif;font-size:24px;font-weight:600;}
  .plan-price{margin-top:14px;display:flex;align-items:baseline;gap:8px;}
  .plan-price .price-num{font-family:'Chakra Petch',sans-serif;font-size:32px;font-weight:700;color:var(--bone);}
  .plan-card.pro .price-num{color:var(--gold);}
  .plan-price .price-period{color:var(--steel);font-size:13px;}
  .plan-card ul{list-style:none;margin-top:28px;flex:1;}
  .plan-card li{display:flex;gap:10px;align-items:flex-start;padding:9px 0;font-size:14.5px;}
  .plan-card .btn-ghost, .plan-card .btn-primary{margin-top:28px;text-align:center;}

  /* ---------- final cta ---------- */
  .final-cta{
    text-align:center;
    padding:96px 32px;
    border-radius:24px;
    background:linear-gradient(165deg, rgba(242,183,5,0.10), var(--charcoal) 60%);
    border:1px solid var(--graphite);
    max-width:1180px;margin:0 auto;
  }
  .final-cta h2{font-size:clamp(2rem,3.6vw,2.8rem);max-width:680px;margin:0 auto 20px;}
  .final-cta p{color:var(--steel);max-width:520px;margin:0 auto 32px;font-size:16px;}

  footer{padding:56px 0 40px;border-top:1px solid var(--graphite);margin-top:64px;}
  footer .wrap{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;}
  footer .brand span{font-size:16px;}
  footer p{color:var(--steel);font-size:13px;}

  @media (max-width:860px){
    .wrap{padding:0 24px;}
    .hero{padding:140px 0 72px;}
    .hero-grid{grid-template-columns:1fr;gap:36px;}
    .hero-photo{order:-1;aspect-ratio:4/5;}
    section{padding:76px 0;}
    .compare{grid-template-columns:1fr;}
    .compare .after{border-left:none;border-top:1px solid var(--graphite);}
    .compare > div{padding:28px;}
    .feat-groups{grid-template-columns:1fr;}
    .feat-card{padding:28px;}
    .steps{grid-template-columns:1fr 1fr;gap:28px 20px;}
    .plans{grid-template-columns:1fr;}
    .plan-card{padding:32px;}
    .final-cta{padding:64px 24px;}
  }

  @media (max-width:520px){
    .wrap{padding:0 20px;}
    nav .wrap{height:66px;}
    .brand span{font-size:15px;}
    .brand img{width:28px;height:28px;}
    .nav-cta{padding:9px 16px;font-size:13px;}
    .hero{padding:120px 0 60px;}
    .hero-photo{aspect-ratio:1/1;}
    .hero-ctas{flex-direction:column;align-items:stretch;}
    .hero-ctas a{text-align:center;}
    .steps{grid-template-columns:1fr;}
    .section-head{margin-bottom:36px;}
    .final-cta h2{font-size:1.7rem;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
</style>
</head>
<body>

<nav>
